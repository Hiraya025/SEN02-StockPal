<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPal | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white shadow-md flex flex-col hidden md:flex">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-bold text-blue-600"><i class="fas fa-boxes mr-2"></i>StockPal</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center p-3 text-blue-700 bg-blue-50 rounded-lg font-medium">
                <i class="fas fa-chart-line mr-3"></i> Dashboard
            </a>
            <a href="#" class="flex items-center p-3 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition">
                <i class="fas fa-clipboard-list mr-3"></i> Inventory
            </a>
            <a href="#" class="flex items-center p-3 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition">
                <i class="fas fa-exchange-alt mr-3"></i> Stock Movement
            </a>
        </nav>
        <div class="p-4 border-t">
            <div class="flex items-center">
                <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold mr-3">A</div>
                <div>
                    <p class="text-sm font-medium text-gray-800">Admin User</p>
                    <p class="text-xs text-gray-500">Manager Role</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center md:hidden">
            <h1 class="text-xl font-bold text-blue-600"><i class="fas fa-boxes mr-2"></i>StockPal</h1>
            <button class="text-gray-500 hover:text-gray-700"><i class="fas fa-bars text-xl"></i></button>
        </header>

        <div class="p-6 md:p-8 max-w-7xl mx-auto w-full">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Inventory Overview</h2>
                    <p class="text-gray-600 mt-1">Real-time stock tracking and alerts.</p>
                </div>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center">
                    <i class="fas fa-plus mr-2"></i> Add Item
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b">
                                <th class="p-4 font-medium">SKU</th>
                                <th class="p-4 font-medium">Item Name</th>
                                <th class="p-4 font-medium">Category</th>
                                <th class="p-4 font-medium">Stock Level</th>
                                <th class="p-4 font-medium text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body" class="divide-y divide-gray-100">
                            <tr>
                                <td colspan="5" class="p-8 text-center text-gray-500">
                                    <i class="fas fa-spinner fa-spin mr-2"></i> Loading inventory data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Fetch data from your Flask Backend
        async function fetchInventory() {
            try {
                const response = await fetch('/api/inventory');
                const data = await response.json();
                
                const tableBody = document.getElementById('inventory-table-body');
                tableBody.innerHTML = ''; // Clear loading message

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500">No items in inventory. Add your first item!</td></tr>';
                    return;
                }

                data.forEach(item => {
                    // Logic for the Low-Stock Alert UI
                    const statusBadge = item.is_low_stock 
                        ? '<span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold border border-red-200"><i class="fas fa-exclamation-circle mr-1"></i> Low Stock</span>'
                        : '<span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold border border-green-200"><i class="fas fa-check-circle mr-1"></i> Optimal</span>';

                    const rowClass = item.is_low_stock ? 'bg-red-50 hover:bg-red-100 transition' : 'hover:bg-gray-50 transition';

                    const row = `
                        <tr class="${rowClass}">
                            <td class="p-4 text-sm font-medium text-gray-900">${item.sku}</td>
                            <td class="p-4 text-sm text-gray-800">${item.item_name}</td>
                            <td class="p-4 text-sm text-gray-500">${item.category || '-'}</td>
                            <td class="p-4 text-sm">
                                <span class="font-bold ${item.is_low_stock ? 'text-red-600' : 'text-gray-800'}">${item.current_stock}</span> 
                                <span class="text-xs text-gray-400">/ Min: ${item.min_threshold}</span>
                            </td>
                            <td class="p-4 text-center">${statusBadge}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching inventory:', error);
                document.getElementById('inventory-table-body').innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-500">Failed to load data. Please check your backend connection.</td></tr>';
            }
        }

        // Run the fetch function when the page loads
        document.addEventListener('DOMContentLoaded', fetchInventory);
    </script>
</body>
</html>
